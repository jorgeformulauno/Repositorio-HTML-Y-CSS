<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configurar Perfil</title>
    <link rel="stylesheet" href="../../../css/style-paginas.css">
</head>
<body>
 
    <div class="perfil-pagina">
        <a href="../principal.html" class="volver-principal">
        <i class="fas fa-chevron-left"></i> Volver al Principal
    </a>
 
        <div class="perfil-encabezado">
            <h1><i class="fas fa-user-cog"></i> Configurar Perfil</h1>
            <p>Actualiza tu información personal y de acceso</p>
        </div>
 
        <div class="perfil-contenido">
 
            <!-- Columna izquierda: foto y datos rápidos -->
            <aside class="perfil-lateral">
                <div class="perfil-foto-grande">
                    <img src="../../../img/imgAdmin.jpg" alt="Foto de perfil" class="foto-perfil-grande">
                    <div class="perfil-foto-overlay">
                        <i class="fas fa-camera"></i>
                        <span>Cambiar foto</span>
                    </div>
                </div>
                <input type="file" id="cambiar-foto" accept="image/*" class="input-foto-oculto">
 
                <div class="perfil-info-rapida">
                    <p class="perfil-nombre-lateral">James Gandolfini</p>
                    <span class="perfil-rol-lateral">Administrador</span>
                    <hr class="perfil-divisor">
                    <ul class="perfil-datos-rapidos">
                        <li><i class="fas fa-envelope"></i> admin@empresa.com</li>
                        <li><i class="fas fa-calendar-alt"></i> Miembro desde 2022</li>
                        <li><i class="fas fa-shield-alt"></i> Acceso total</li>
                    </ul>
                </div>
            </aside>
 
            <!-- Columna derecha: formularios -->
            <div class="perfil-formularios">
 
                <!-- Sección: Datos personales -->
                <div class="perfil-seccion">
                    <div class="perfil-seccion-titulo">
                        <i class="fas fa-id-card"></i>
                        <h2>Datos Personales</h2>
                    </div>
 
                    <div class="perfil-grid">
                        <div class="perfil-campo">
                            <label for="nombres">Nombres</label>
                            <input type="text" id="nombres" name="nombres" value="James" placeholder="Tu nombre">
                        </div>
                        <div class="perfil-campo">
                            <label for="apellidos">Apellidos</label>
                            <input type="text" id="apellidos" name="apellidos" value="Gandolfini" placeholder="Tus apellidos">
                        </div>
                        <div class="perfil-campo">
                            <label for="correo">Correo electrónico</label>
                            <input type="email" id="correo" name="correo" value="admin@empresa.com" placeholder="correo@ejemplo.com">
                        </div>
                        <div class="perfil-campo">
                            <label for="telefono">Teléfono</label>
                            <input type="tel" id="telefono" name="telefono" placeholder="3001234567">
                        </div>
                        <div class="perfil-campo perfil-campo-completo">
                            <label for="bio">Descripción / Bio</label>
                            <textarea id="bio" name="bio" rows="3" placeholder="Cuéntanos algo sobre ti..."></textarea>
                        </div>
                    </div>
                </div>
 
                <!-- Sección: Cambiar contraseña -->
                <div class="perfil-seccion">
                    <div class="perfil-seccion-titulo">
                        <i class="fas fa-lock"></i>
                        <h2>Cambiar Contraseña</h2>
                    </div>
 
                    <div class="perfil-grid">
                        <div class="perfil-campo perfil-campo-completo">
                            <label for="pass-actual">Contraseña actual</label>
                            <input type="password" id="pass-actual" name="pass-actual" placeholder="••••••••">
                        </div>
                        <div class="perfil-campo">
                            <label for="pass-nueva">Nueva contraseña</label>
                            <input type="password" id="pass-nueva" name="pass-nueva" placeholder="••••••••">
                        </div>
                        <div class="perfil-campo">
                            <label for="pass-confirmar">Confirmar contraseña</label>
                            <input type="password" id="pass-confirmar" name="pass-confirmar" placeholder="••••••••">
                        </div>
                    </div>
                </div>
 
                <!-- Botones de acción -->
                <div class="perfil-acciones">
                    <a href="../index-admin.html" class="btn-perfil btn-cancelar">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                    <button type="button" class="btn-perfil btn-guardar">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                </div>
 
            </div>
        </div>
 
    </div>
 
</body>
</html>
